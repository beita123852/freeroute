services:
  freeroute:
    build:
      context: .
      dockerfile: Dockerfile
    image: freeroute:latest
    container_name: freeroute
    restart: unless-stopped
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      - FREEROUTE_API_KEY=${FREEROUTE_API_KEY:-}
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount config.yaml for runtime configuration changes
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
